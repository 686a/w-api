services:
  api:
    build:
      context: .
    environment:
      DATABASE_URL: mongodb://mongo:27017
      DATABASE_NAME: ${DATABASE_NAME:-w-api}
      REMOTE_API_DOMAIN: ${REMOTE_API_DOMAIN:?REMOTE_API_DOMAIN must be set}
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "${API_PORT:-8080}:8080"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test:
        [
          "CMD",
          "mongosh",
          "--quiet",
          "--eval",
          "db.adminCommand({ ping: 1 }).ok",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  mongo-data:
